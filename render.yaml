services:
  - type: web
    name: cgpa-project
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn cgpa_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: c-calc.onrender.com
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_VEGQ8YcOSXi3@ep-green-dust-al541uxs-pooler.c-3.eu-central-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: TWILIO_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
